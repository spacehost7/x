# .github/workflows/post-us-markets.yml

name: Post US Markets

on:
  schedule:
    # 米株引け(16:00 ET)の約3分後を日本時間 6:03 JST で狙う
    # GitHub Actions の cron は UTC 指定なので、JST-9時間 = 21:03 (前日)
    - cron: "3 21 * * 1-5"
  workflow_dispatch:

jobs:
  us-close:
    runs-on: ubuntu-latest

    env:
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance tweepy anthropic

      - name: Post US markets close summary
        run: |
          python bot_us_close.py
