name: post-jp-markets

on:
  schedule:
    # 前場: JST 11:25〜11:35ごろをカバー（UTC 2:25〜2:35）
    - cron: "25-35/5 2 * * 1-5"
    # 後場: JST 15:25〜15:45ごろをカバー（UTC 6:25〜6:45）
    - cron: "25-45/5 6 * * 1-5"

  workflow_dispatch:

jobs:
  jp-morning:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install tweepy anthropic requests

      - name: Run morning bot
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python bot_jp_morning.py

  jp-close:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install tweepy anthropic requests

      - name: Run close bot
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python bot_jp_close.py
