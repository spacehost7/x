name: jp-markets

on:
  workflow_dispatch:
  schedule:
    - cron: '35 2 * * 1-5'  # 11:35 JST 前場短観
    - cron: '10 6 * * 1-5'  # 15:10 JST 引け後短観

jobs:
  jp-morning:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '35 2 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance tweepy anthropic

      - name: Run morning bot
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python bot_jp_morning.py

  jp-close:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '10 6 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance tweepy anthropic

      - name: Run close bot
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python bot_jp_close.py
